# biome는 node_modules/.bin/biome로 직접 호출한다.
# `pnpm exec biome`는 일부 환경에서 네이티브 바이너리 spawn에 실패하며
# "possibly out of memory"로 오보한다(실제 OOM 아님). .bin 직접 호출은 정상.
# covenant가 biome보다 먼저(priority 1) 실패해야 차단 사유가 명확하다(ADAPTER-git §4.5).
# piped: 판정이 차단하면 이후 단계는 돌지 않는다. 유예 밸브는 bin이 /dev/tty로 직접 연다 —
# 터미널 앞의 인간에게만 열리고, 에이전트가 spawn한 git에는 TTY가 없어 닿지 않는다.
pre-commit:
  piped: true
  commands:
    covenant:
      priority: 1
      run: ./node_modules/.bin/pdks covenant check
    check:
      priority: 2
      run: ./node_modules/.bin/biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    format:
      priority: 3
      run: ./node_modules/.bin/biome format --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
