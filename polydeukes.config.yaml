# yaml-language-server: $schema=node_modules/@polydeukes/core/schema/polydeukes.schema.json

languages:
  typescript:
    productionGlob: 'packages/*/src/**/*.ts'
    testCmd: 'pnpm --filter {scope} test'

protectedPaths:
  - 'packages/core/src'
  - 'packages/core/dist'
  - 'packages/covenant/src'
  - 'packages/covenant/dist'
  - '.claude/hooks'
  - '.claude/settings.json'
  - 'packages/polydeukes/src'
  - 'packages/polydeukes/dist'

adapters:
  - 'packages/adapter-claude-code/src'
  - 'packages/adapter-claude-code/dist'
  - 'packages/adapter-git/src'
  - 'packages/adapter-git/dist'

# The time-boxed valve. A human types this token into the conversation and the waiver
# holds for ttlMinutes from that message, then blocking resumes on its own — replacing
# an env valve whose "armed until you remember to disarm" shape measured 562 bypasses
# in a single day. The token is not a secret: the defence is provenance, not
# confidentiality. Only a real human utterance carries the transcript marking the
# predicate admits, and no agent can forge that marking.
#
# The token must stand alone on the message's first line: mentioning it mid-sentence is
# talking about the valve, not opening it (COVENANT-15). Any value works — placement is
# what is judged, never the phrase's shape.
waiver:
  token: 'pdks waive'
  ttlMinutes: 10

disciplines:
  - id: 'covenant-vocabulary'
    why: 'domain-terms bans control-framing vocabulary in package sources; added-direction judgment forgives existing debt and blocks only new occurrences.'
    in:
      - 'packages/core/src/**'
      - 'packages/covenant/src/**'
      - 'packages/adapter-claude-code/src/**'
    forbid: '\b(guard|harness|kb)\b'
  - id: 'hooks-stay-armed'
    why: 'a command that disarms, reroutes, or skips the commit gates is a gate bypass in itself.'
    forbidCommand: 'LEFTHOOK=(0|false|no|off)\b|core\.hooksPath|--no-verify\b|--no-gpg-sign\b'
  - id: 'work-stays-recoverable'
    why: 'a command that destroys uncommitted work or rewrites pushed history forecloses recovery; recovery is a human decision, never an agent default.'
    forbidCommand: 'git reset\b.*--hard|git clean\b.*-f|git checkout -- \.|git branch\b.*\s-D\b|git push\b.*--force'
  - id: 'pnpm-only'
    why: 'the runtime pins pnpm; npm/yarn mutations desync the lockfile. read-only npm (view, info) stays allowed for version measurement.'
    forbidCommand: '\bnpm (install|i|ci|add|uninstall|remove|rm|update|up|link|publish)\b|(^|[;&|(]\s*)yarn\b'
  - id: 'english-only-sources'
    why: 'code comments and test titles are English-only; Korean belongs in docs and conversation.'
    in:
      - 'packages/*/src/**'
      - 'packages/*/__tests__/**'
    forbid: '[가-힣]'
  - id: 'core-stays-runner-agnostic'
    why: 'the core never names a test runner; verification is an exit code and the command is config. self-enforces the CORE-01 grep gate at edit time.'
    in:
      - 'packages/core/src/**'
      - 'packages/core/schema/**'
    forbid: '\b(vitest|pytest|go test)\b'
