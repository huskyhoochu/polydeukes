packages:
  - "apps/*"
  - "packages/*"

# Shared dependency versions — defined once here, referenced as `catalog:` in
# each package.json. TypeScript 7.0 GA (the native Go compiler). Bump this one
# line on patch releases and every package follows.
catalog:
  "@types/node": ^24.0.0
  typescript: 7.0.2
  vitest: ^4.1.0

onlyBuiltDependencies:
  - lefthook
